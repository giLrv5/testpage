<!doctype html>
<html lang="zh-Hant">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WGRE5XGNNF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-WGRE5XGNNF');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地時間與 IP 顯示器</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #3a6ea5 0%, #132238 45%, #0a1220 100%);
      }

      .card {
        width: min(92vw, 640px);
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.15);
        color: #f9fbff;
        backdrop-filter: blur(8px);
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0.35rem 0;
        line-height: 1.6;
      }

      .time {
        margin-top: 1rem;
        font-size: clamp(1.35rem, 4vw, 2rem);
        font-weight: 700;
      }

      .info-grid {
        display: grid;
        gap: 0.85rem;
        margin-top: 1.25rem;
      }

      .info-item {
        padding: 0.9rem 1rem;
        border-radius: 0.85rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .label {
        display: block;
        font-size: 0.9rem;
        opacity: 0.82;
      }

      .value {
        display: block;
        margin-top: 0.25rem;
        font-size: 1.05rem;
        font-weight: 600;
        word-break: break-word;
      }

      .hint {
        margin-top: 1rem;
        font-size: 0.95rem;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>使用者所在地區時間與 IP 資訊</h1>
      <p id="timezone">時區：讀取中...</p>
      <p id="datetime" class="time">--:--:--</p>

      <section class="info-grid" aria-label="IP 與國籍資訊">
        <div class="info-item">
          <span class="label">目前 IP</span>
          <span id="ip" class="value">偵測中...</span>
        </div>
        <div class="info-item">
          <span class="label">IP 所在國家 / 國籍</span>
          <span id="country" class="value">偵測中...</span>
        </div>
      </section>

      <p class="hint">此頁面會自動更新本地時間，並透過公開 IP 定位服務偵測你的 IP 與該 IP 所屬國家。</p>
    </main>

    <script>
      const timezoneEl = document.getElementById('timezone');
      const datetimeEl = document.getElementById('datetime');
      const ipEl = document.getElementById('ip');
      const countryEl = document.getElementById('country');

      const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || '未知時區';
      timezoneEl.textContent = `時區：${zone}`;

      function updateTime() {
        const now = new Date();
        const formatted = new Intl.DateTimeFormat('zh-TW', {
          dateStyle: 'full',
          timeStyle: 'medium',
          hour12: false,
        }).format(now);
        datetimeEl.textContent = formatted;
      }

      async function loadIpDetails() {
        try {
          const response = await fetch('https://ipwho.is/');
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          if (!data.success) {
            throw new Error(data.message || 'IP 查詢失敗');
          }

          ipEl.textContent = data.ip || '無法取得';
          countryEl.textContent = data.country ? `${data.country}（${data.country_code || 'N/A'}）` : '無法取得';
        } catch (error) {
          ipEl.textContent = '無法偵測';
          countryEl.textContent = '無法判斷';
          console.error('載入 IP 資訊失敗：', error);
        }
      }

      updateTime();
      loadIpDetails();
      setInterval(updateTime, 1000);
    </script>
  </body>
</html>
